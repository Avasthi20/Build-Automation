name: build flow

on: 
  workflow_dispatch:
  push:
    paths:
      ./Dockerfile
      ./src/*  
permissions:
  contents: write

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with: 
        username: ${{ vars.DOCKERHUB_USERNAME  }}
        password: ${{ secrets.DOCKERHUB_TOKEN  }}
    - name: checkout repo 
      uses: actions/checkout@v6
    - name: build docker image
      uses: docker/setup-buildx-action@v4
    - name: push image to docker hub 
      uses: docker/build-push-action@v7
      with: 
        push: true
        tags: |
          avasthi20/flask-test:latest
          avasthi20/flask-test:${{ github.run_number }}
    - name: push in k8s
      run: |
            sed -i "s|image:.*|image: avasthi20/flask-test:${{ github.run_number }}|g" k8s/deploy.yaml 
    - name: Commit changes
      run: |
        git config --global user.name "avasthi20"
        git config --global user.email "avasthi.amit20@gamil.com"
        git add .
        git commit -m "auto update [skip ci]" || echo "No changes"

    - name: Push changes
      run: git push
  


